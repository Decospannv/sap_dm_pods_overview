  <meta charset="UTF-8">
  <title>PODS overview</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f9f9f9;
    }
    .sidebar {
      width: 250px;
      background-color: #1e3d2f; /* racing green */
      color: white;
      display: flex;
      flex-direction: column;
      padding: 15px;
    }
    .sidebar h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
    }
    .sidebar select {
      margin-bottom: 20px;
      padding: 5px;
      border-radius: 5px;
      border: none;
    }
    .sidebar a {
      display: block;
      padding: 10px;
      margin: 5px 0;
      background-color: #2f5d47;
      color: white;
      text-decoration: none;
      text-align: center;
      border-radius: 8px;
      transition: background-color 0.2s;
    }
    .sidebar a:hover {
      background-color: #3f7d63;
    }
	.sidebar a.active {
	  background-color: #76961d;
	  font-weight: bold;
	}
	.sidebar a.active_red {
	  background-color: #c62828;
	  font-weight: bold;
	}
    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    header {
      padding: 10px;
      color: white;
      font-weight: bold;
      text-align: center;
    }
    header.qas {
      background-color: #2e7d32; /* groen */
    }
    header.live {
      background-color: #c62828; /* rood */
    }
    .accordion-item {
      margin-bottom: 10px;
    }
    .accordion-header {
      background-color: #eee;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .accordion-content.open {
      padding: 10px;
    }
    .tile { 
      width: 220px;
      padding: 15px;
      text-align: center;
      background-color: #2f5d47; /* racing green */
      color: white;
      border-radius: 10px;
      border: none;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    }
    .tile:hover {
      background-color: #3f7d63; /* lichter groen */
      transform: scale(1.05);
      box-shadow: 4px 4px 12px rgba(0,0,0,0.2);
    }
  </style>
</head>

			"tile.repair13":   () => buildPodUrl({ env:"qas", podVersion:"1", podId:"ZD_GUIDED_REPAIR_ONLY", workcenter:"SORTLN3", resource:"SORT3_6"})
	  },
	  p040_live: {
			"tile.grading1":   () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_GRADE", workcenter:"GRADELN1", resource:"GRADE1"}),
			"tile.grading2":   () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_GRADE", workcenter:"GRADELN1", resource:"GRADE2"}),
			"tile.prep1":      () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_PREP",  workcenter:"PREPLN1", resource:"PREP1"}),
			"tile.prep2":      () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_PREP",  workcenter:"PREPLN1", resource:"PREP2"}),
			"tile.splice1in":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_IN",  workcenter:"SPLICEL1", resource:"SPLICEL1"}),
			"tile.splice1m2":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_OUT", workcenter:"SPLICEL1", resource:"SPLICE2"}),
			"tile.splice1m3":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_OUT", workcenter:"SPLICEL1", resource:"SPLICE3"}),
			"tile.splice1m4":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_OUT", workcenter:"SPLICEL1", resource:"SPLICE4"}),
			"tile.splice2in":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_IN",  workcenter:"SPLICEL2", resource:"SPLICEL2"}),
			"tile.splice2m5":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_OUT", workcenter:"SPLICEL2", resource:"SPLICE5"}),
			"tile.splice2m6":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_OUT", workcenter:"SPLICEL2", resource:"SPLICE6"}),
			"tile.splice2m7":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_OUT", workcenter:"SPLICEL2", resource:"SPLICE7"}),
			"tile.splice2m8":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLICE_OUT", workcenter:"SPLICEL2", resource:"SPLICE8"}),
			"tile.trim1":      () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_TRIM", workcenter:"TRIMLN1", resource:"TRIMLN1"}),
			"tile.trim2":      () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_TRIM", workcenter:"TRIMLN2", resource:"TRIMLN2"}),
			"tile.trim3":      () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_TRIM", workcenter:"TRIMLN3", resource:"TRIMLN3"}),
			"tile.cut1":       () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_TRIM", workcenter:"CUTLN1", resource:"CUTLN1"}),
			"tile.split1":     () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SPLITBYLENGTH", workcenter:"SPLITLN1", resource:"SPLITLN1"}),
			"tile.sortrepair1":() => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_REPAIR", workcenter:"SORTLN1", resource:"SORT1_1"}),
			"tile.sortrepair2":() => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_REPAIR", workcenter:"SORTLN1", resource:"SORT1_2"}),
			"tile.sortrepair3":() => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_REPAIR", workcenter:"SORTLN1", resource:"SORT1_3"}),
			"tile.sortrepair4":() => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_REPAIR", workcenter:"SORTLN1", resource:"SORT1_4"}),
			"tile.sortonly4":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_ONLY", workcenter:"SORTLN2", resource:"SORT2_1"}),
			"tile.sortonly5":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_ONLY", workcenter:"SORTLN2", resource:"SORT2_2"}),
			"tile.sortonly6":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_ONLY", workcenter:"SORTLN2", resource:"SORT2_3"}),
			"tile.sortonly7":  () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_ONLY", workcenter:"SORTLN2", resource:"SORT2_4"}),
			"tile.sortonly20": () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_SORT_ONLY", workcenter:"SORTLN2", resource:"SORT2_20"}),
			"tile.repair8":    () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_REPAIR_ONLY", workcenter:"SORTLN3", resource:"SORT3_1"}),
			"tile.repair9":    () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_REPAIR_ONLY", workcenter:"SORTLN3", resource:"SORT3_2"}),
			"tile.repair10":   () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_REPAIR_ONLY", workcenter:"SORTLN3", resource:"SORT3_3"}),
			"tile.repair11":   () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_REPAIR_ONLY", workcenter:"SORTLN3", resource:"SORT3_4"}),
			"tile.repair12":   () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_REPAIR_ONLY", workcenter:"SORTLN3", resource:"SORT3_5"}),
			"tile.repair13":   () => buildPodUrl({ env:"live", podVersion:"1", podId:"ZD_GUIDED_REPAIR_ONLY", workcenter:"SORTLN3", resource:"SORT3_6"})
	  }
	};

    const groups = [
	  { key:"group.grading", tiles:["tile.grading1","tile.grading2"] },
	  { key:"group.preparation", tiles:["tile.prep1","tile.prep2","tile.split1"] },
	  { key:"group.splice1", tiles:["tile.splice1in","tile.splice1m2","tile.splice1m3","tile.splice1m4"] },
	  { key:"group.splice2", tiles:["tile.splice2in","tile.splice2m5","tile.splice2m6","tile.splice2m7","tile.splice2m8"] },
	  { key:"group.trimming", tiles:["tile.trim1","tile.trim2","tile.trim3","tile.cut1"] },
	  { key:"group.sortrepair", tiles:["tile.sortrepair1","tile.sortrepair2","tile.sortrepair3","tile.sortrepair4","tile.sortrepair7","tile.sortln1","tile.sortln2","tile.sortln3","tile.sortln4","tile.sortln7"] },
	  { key:"group.sortonly", tiles:["tile.sortonly4","tile.sortonly5","tile.sortonly6","tile.sortonly7","tile.sortonly20"] },
	  { key:"group.repaironly", tiles:["tile.repair8","tile.repair9","tile.repair10","tile.repair11","tile.repair12","tile.repair13"] },
	  { key:"group.press_saw", tiles:["tile.saw1", "tile.saw2", "tile.press2", "tile.press3"] },
	  { key:"group.varnish", tiles:[] },
	  { key:"group.finishing", tiles:["tile.multi1"] }

	];

    let currentLang = localStorage.getItem("lang") || "en";
    let currentEnv = localStorage.getItem("env") || "p040_qas";
    let savedGroup = localStorage.getItem("group") || null;

    function renderGroups() {
      const container = document.getElementById("groupsContainer");
      container.innerHTML = "";
	  groups.filter(group => group.tiles.some(tile => links[currentEnv]?.[tile]))
	  .forEach(group => {
        const item = document.createElement("div");
        item.classList.add("accordion-item");

        const header = document.createElement("div");
        header.classList.add("accordion-header");
        header.setAttribute("data-translate", group.key);
        header.textContent = translations[currentLang][group.key];

        const content = document.createElement("div");
        content.classList.add("accordion-content");

        group.tiles.forEach(tileKey => {
          if(!links[currentEnv][tileKey]) return;
          const btn = document.createElement("button");
          btn.classList.add("tile");
          btn.setAttribute("data-translate", tileKey);
          btn.textContent = translations[currentLang][tileKey];
		  btn.onclick = () => window.open(links[currentEnv][tileKey](), "_blank");
          content.appendChild(btn);
        });

        header.addEventListener("click", () => {
          document.querySelectorAll(".accordion-content").forEach(c => {
            if(c !== content) {
              c.style.maxHeight = null;
              c.classList.remove("open");
            }
          });
          if(content.classList.contains("open")) {
            content.style.maxHeight = null;
            content.classList.remove("open");
          } else {
            content.classList.add("open");
            content.style.maxHeight = content.scrollHeight + "px";
          }
          localStorage.setItem("group", group.key);
        });

        item.appendChild(header);
        item.appendChild(content);
        container.appendChild(item);
      });

      if(savedGroup) {
        const header = document.querySelector(`.accordion-header[data-translate="${savedGroup}"]`);
        if(header) {
          const content = header.nextElementSibling;
          content.classList.add("open");
          content.style.maxHeight = content.scrollHeight + "px";
        }
      }
    }

    function translatePage() {
      document.querySelectorAll("[data-translate]").forEach(el=>{
        const key = el.getAttribute("data-translate");
        if(translations[currentLang][key]) el.textContent = translations[currentLang][key];
      });
    }

    function loadEnv(env) {
      currentEnv = env;
      localStorage.setItem("env", env);
	
	  document.querySelectorAll(".sidebar a").forEach(a =>a.classList.remove("active"));
	  document.querySelectorAll(".sidebar a").forEach(a =>a.classList.remove("active_red"));

      const header = document.getElementById("envHeader");
	  if (env.endsWith("_live")) {
		header.className = "live";
        const activeLink = document.querySelector(`.sidebar a[onclick="loadEnv('${env}')"]`);
        if (activeLink) activeLink.classList.add("active_red");

	  } else {
		header.className = "qas";
        const activeLink = document.querySelector(`.sidebar a[onclick="loadEnv('${env}')"]`);
        if (activeLink) activeLink.classList.add("active");
	  }
	  header.setAttribute("data-translate", `${env}`);
	  renderGroups();
      translatePage();
    }

    document.getElementById("languageSelect").value = currentLang;
    document.getElementById("languageSelect").addEventListener("change", e => {
      currentLang = e.target.value;
      localStorage.setItem("lang", currentLang);
      renderGroups();
      translatePage();
    });

    renderGroups();
    translatePage();
    loadEnv(currentEnv);
  </script>
</body>
</html>

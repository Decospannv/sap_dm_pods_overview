  <meta charset="UTF-8">
  <title>PODS overview</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f9f9f9;
    }
    .sidebar {
      width: 250px;
      background-color: #1e3d2f;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 15px;
    }
    .sidebar h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
    }
    .sidebar a {
      display: block;
      padding: 10px;
      margin: 5px 0;
      background-color: #2f5d47;
      color: white;
      text-decoration: none;
      text-align: center;
      border-radius: 8px;
      transition: background-color 0.2s;
    }
    .sidebar a:hover       { background-color: #3f7d63; }
    .sidebar a.active      { background-color: #76961d; font-weight: bold; }
    .sidebar a.active_red  { background-color: #c62828; font-weight: bold; }

    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    header {
      padding: 10px;
      color: white;
      font-weight: bold;
      text-align: center;
      margin-bottom: 12px;
      border-radius: 5px;
    }
    header.qas  { background-color: #2e7d32; }
    header.live { background-color: #c62828; }

    .accordion-item   { margin-bottom: 10px; }
    .accordion-header {
      background-color: #eee;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .accordion-content.open { padding: 10px; }

    .tile {
      width: 220px;
      padding: 15px;
      text-align: center;
      background-color: #2f5d47;
      color: white;
      border-radius: 10px;
      border: none;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    }
    .tile:hover {
      background-color: #3f7d63;
      transform: scale(1.05);
      box-shadow: 4px 4px 12px rgba(0,0,0,0.2);
    }
  </style>
</head>

    { key:"group.splice2",     tiles:["tile.splice2in","tile.splice2m5","tile.splice2m6","tile.splice2m7","tile.splice2m8"] },
    { key:"group.trimming",    tiles:["tile.trim1","tile.trim2","tile.trim3","tile.cut1"] },
    { key:"group.sortrepair",  tiles:["tile.sortrepair1","tile.sortrepair2","tile.sortrepair3","tile.sortrepair4","tile.sortln1","tile.sortln2","tile.sortln3","tile.sort4","tile.sort5","tile.sort6","tile.sortln7"] },
    { key:"group.sortonly",    tiles:["tile.sortonly4","tile.sortonly5","tile.sortonly6","tile.sortonly7","tile.sortonly20"] },
    { key:"group.repaironly",  tiles:["tile.repair8","tile.repair9","tile.repair10","tile.repair11","tile.repair12","tile.repair13"] },
    { key:"group.press_saw",   tiles:["tile.saw1","tile.saw2","tile.saw3","tile.press2","tile.press3"] },
    { key:"group.varnish",     tiles:["tile.varnish1","tile.varnish2","tile.varnish4","tile.varnish5"] },
    { key:"group.finishing",   tiles:["tile.multi1","tile.multi3","tile.sand1","tile.pack1"] }
  ];

  // ── State ────────────────────────────────────────────────────────────────────
  let currentEnv  = localStorage.getItem("env")   || "p010_qas";
  let savedGroup  = localStorage.getItem("group") || null;

  // ── Render accordion ─────────────────────────────────────────────────────────
  function renderGroups() {
    const container = document.getElementById("groupsContainer");
    container.innerHTML = "";

    groups
      .filter(group => group.tiles.some(tile => links[currentEnv]?.[tile]))
      .forEach(group => {
        const item    = document.createElement("div");
        item.classList.add("accordion-item");

        const header  = document.createElement("div");
        header.classList.add("accordion-header");
        header.textContent = translations[group.key];

        const content = document.createElement("div");
        content.classList.add("accordion-content");

        group.tiles.forEach(tileKey => {
          if (!links[currentEnv]?.[tileKey]) return;
          const btn = document.createElement("button");
          btn.classList.add("tile");
          btn.textContent = translations[tileKey] ?? tileKey;
          btn.onclick = () => window.open(links[currentEnv][tileKey](), "_blank");
          content.appendChild(btn);
        });

        header.addEventListener("click", () => {
          const isOpen = content.classList.contains("open");
          // close all panels
          document.querySelectorAll(".accordion-content").forEach(c => {
            c.style.maxHeight = null;
            c.classList.remove("open");
          });
          // re-open if it was closed
          if (!isOpen) {
            content.classList.add("open");
            content.style.maxHeight = content.scrollHeight + "px";
          }
          localStorage.setItem("group", group.key);
        });

        item.appendChild(header);
        item.appendChild(content);
        container.appendChild(item);
      });

    // restore previously open group
    if (savedGroup) {
      const header = document.querySelector(`.accordion-header[data-group="${savedGroup}"]`);
      // use data-group attribute set below
    }

    // set data-group on each header for restore logic
    container.querySelectorAll(".accordion-header").forEach((h, i) => {
      const visibleGroups = groups.filter(g => g.tiles.some(t => links[currentEnv]?.[t]));
      h.dataset.group = visibleGroups[i]?.key;
    });

    if (savedGroup) {
      const header = container.querySelector(`.accordion-header[data-group="${savedGroup}"]`);
      if (header) {
        const content = header.nextElementSibling;
        content.classList.add("open");
        content.style.maxHeight = content.scrollHeight + "px";
      }
    }
  }

  // ── Load environment ─────────────────────────────────────────────────────────
  function loadEnv(env) {
    currentEnv = env;
    localStorage.setItem("env", env);

    // update header
    const header = document.getElementById("envHeader");
    header.textContent = translations[env];
    header.className   = env.endsWith("_live") ? "live" : "qas";

    // update sidebar active state
    document.querySelectorAll(".sidebar a").forEach(a => {
      a.classList.remove("active", "active_red");
    });
    const activeLink = document.querySelector(`.sidebar a[onclick="loadEnv('${env}')"]`);
    if (activeLink) {
      activeLink.classList.add(env.endsWith("_live") ? "active_red" : "active");
    }

    renderGroups();
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  loadEnv(currentEnv);
</script>

</body>
</html>
